<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực đơn - FoodieMenu</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
</head>
<body class="bg-background">

    <!-- Header will be injected by components.js -->

    <!-- Main Content -->
    <main class="container py-5 flex-grow-1">
        <div class="row g-4">
            
            <!-- Sidebar Filters -->
            <aside class="col-lg-3">
                <div class="d-flex flex-column gap-4 sticky-top" style="top: 100px; z-index: 10;">
                    
                    <div class="glass-panel">
                        <h5 class="fw-bold mb-3">Danh mục</h5>
                        <div id="categoryCheckboxes" class="d-flex flex-column gap-2">
                            <div class="form-check">
                                <input class="form-check-input category-checkbox" type="checkbox" value="" id="catAll" checked>
                                <label class="form-check-label" for="catAll">Tất cả</label>
                            </div>
                        </div>
                    </div>

                    <div class="glass-panel">
                        <h5 class="fw-bold mb-3">Khoảng giá</h5>
                        <div class="px-2">
                            <input type="range" class="form-range price-range" min="0" max="1000000" step="10000" id="priceRange" value="1000000">
                            <div class="d-flex justify-content-between mt-2 text-muted small">
                                <span>0đ</span>
                                <span id="priceValue">1.000.000đ+</span>
                            </div>
                        </div>
                    </div>

                    <div class="glass-panel">
                        <h5 class="fw-bold mb-3">Trạng thái</h5>
                        <div class="form-check form-switch d-flex align-items-center gap-2 ps-0">
                            <input class="form-check-input ms-0 toggle-switch" type="checkbox" id="statusToggle" checked>
                            <label class="form-check-label ms-2 small text-muted" for="statusToggle">Chỉ hiện món còn phục vụ</label>
                        </div>
                    </div>

                </div>
            </aside>

            <!-- Product Grid Area -->
            <section class="col-lg-9">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 mb-4">
                    <div class="search-container w-100" style="max-width: 400px;">
                        <i class="fa fa-search search-icon"></i>
                        <input type="text" id="searchInput" class="form-control search-input" placeholder="Tìm kiếm món ăn...">
                    </div>
                    <div id="resultCount" class="text-muted small">
                        Đang tải món ăn...
                    </div>
                </div>

                <div id="dishContainer" class="row g-4">
                    <!-- Dishes will be loaded here -->
                </div>
                
                <div id="emptyState" class="text-center py-5 d-none">
                    <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" alt="Empty" width="120" class="mb-3 opacity-50">
                    <h3 class="text-muted">Không tìm thấy món ăn nào phù hợp</h3>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer will be injected by components.js -->

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content overflow-hidden border-0 shadow-lg" style="border-radius: 1.5rem;">
                <div class="modal-body p-0">
                    <div class="row g-0">
                        <div class="col-md-6">
                            <img id="detailImage" src="" alt="" class="img-fluid h-100 w-100" style="object-fit: cover; min-height: 400px;">
                        </div>
                        <div class="col-md-6 p-4 d-flex flex-column">
                            <button type="button" class="btn-close ms-auto mb-2" data-bs-dismiss="modal" aria-label="Close"></button>
                            <div class="mb-2">
                                <span id="detailBadge" class="badge rounded-pill px-3"></span>
                                <span id="detailCategory" class="ms-2 text-muted small fw-bold"></span>
                            </div>
                            <h2 id="detailTitle" class="fw-bold mb-3"></h2>
                            <h3 id="detailPrice" class="text-primary fw-bold mb-3"></h3>
                            <p id="detailDescription" class="text-muted mb-4 flex-grow-1"></p>
                            <div class="d-flex align-items-center mb-4">
                                <span class="me-2 text-warning"><i class="fas fa-star"></i></span>
                                <span id="detailRating" class="fw-bold"></span>
                                <span class="ms-1 text-muted">/ 5.0</span>
                            </div>
                            <button class="btn btn-primary w-100 rounded-pill py-3 fw-bold">Thêm vào đơn hàng</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
